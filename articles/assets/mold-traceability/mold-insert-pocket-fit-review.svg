<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Mold insert and pocket virtual fit review</title>
  <desc id="desc">A conceptual inspection diagram showing a measured mold insert aligned to a mold pocket with qualitative gap, contact, and interference zones plus a section view.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#DEE7EF" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#40566F"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#F5F8FB"/>
  <rect x="34" y="34" width="1132" height="607" rx="6" fill="#FFFFFF" stroke="#C9D6E3" stroke-width="2"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="82" font-size="26" font-weight="700" fill="#17324D">MOLD INSERT-TO-POCKET VIRTUAL FIT REVIEW</text>
    <text x="70" y="112" font-size="15" fill="#60758A">Measured insert model aligned to functional pocket datums</text>

    <rect x="72" y="145" width="660" height="420" rx="4" fill="url(#grid)" stroke="#B8C8D8"/>
    <rect x="134" y="205" width="536" height="300" rx="22" fill="#DCE5EC" stroke="#4D6275" stroke-width="18"/>
    <rect x="175" y="244" width="454" height="222" rx="12" fill="#FFFFFF" stroke="#92A7B9" stroke-width="4"/>

    <path d="M217 286H339L378 263H486L527 289H589V421H522L482 446H380L340 423H217Z"
      fill="#5DA9D6" fill-opacity="0.32" stroke="#1E66A8" stroke-width="5"/>
    <path d="M225 292H341L381 272H481L521 296H581V413H518L478 436H384L344 416H225Z"
      fill="none" stroke="#2CAD73" stroke-width="5" stroke-dasharray="12 8"/>

    <path d="M217 286H339" stroke="#E6B63D" stroke-width="11" opacity="0.85"/>
    <path d="M217 286V421" stroke="#D9574D" stroke-width="11" opacity="0.85"/>
    <path d="M589 289V421" stroke="#5A91C8" stroke-width="11" opacity="0.85"/>
    <path d="M340 423L380 446H482L522 421" fill="none" stroke="#2CAD73" stroke-width="11" opacity="0.85"/>

    <g fill="none" stroke="#40566F" stroke-width="2" marker-end="url(#arrow)">
      <path d="M185 180L240 275"/>
      <path d="M414 179L427 262"/>
      <path d="M620 185L579 287"/>
      <path d="M607 491L527 426"/>
    </g>
    <g font-size="14" font-weight="700" fill="#29445E">
      <text x="115" y="172">POCKET DATUM</text>
      <text x="352" y="171">MEASURED INSERT</text>
      <text x="553" y="177">SIDE FIT</text>
      <text x="555" y="512">SEATING SURFACE</text>
    </g>

    <rect x="762" y="145" width="364" height="420" rx="4" fill="#F8FAFC" stroke="#B8C8D8"/>
    <text x="790" y="184" font-size="17" font-weight="700" fill="#17324D">SECTION A-A</text>
    <rect x="798" y="223" width="292" height="160" rx="3" fill="#FFFFFF" stroke="#C5D3DF"/>
    <path d="M826 342V265H1062V342" fill="#DCE5EC" stroke="#4D6275" stroke-width="12"/>
    <path d="M865 326V282H1023V326Z" fill="#5DA9D6" fill-opacity="0.35" stroke="#1E66A8" stroke-width="4"/>
    <line x1="865" y1="335" x2="1023" y2="335" stroke="#2CAD73" stroke-width="8"/>
    <line x1="858" y1="282" x2="858" y2="326" stroke="#D9574D" stroke-width="8"/>
    <line x1="1030" y1="282" x2="1030" y2="326" stroke="#5A91C8" stroke-width="8"/>

    <text x="790" y="421" font-size="14" font-weight="700" fill="#17324D">QUALITATIVE FIT STATUS</text>
    <g font-size="13" fill="#334E68">
      <rect x="792" y="444" width="22" height="16" rx="2" fill="#2CAD73"/><text x="826" y="457">Nominal contact trend</text>
      <rect x="792" y="475" width="22" height="16" rx="2" fill="#E6B63D"/><text x="826" y="488">Review zone</text>
      <rect x="792" y="506" width="22" height="16" rx="2" fill="#D9574D"/><text x="826" y="519">Interference risk</text>
      <rect x="962" y="506" width="22" height="16" rx="2" fill="#5A91C8"/><text x="996" y="519">Excess gap</text>
    </g>

    <text x="72" y="604" font-size="14" fill="#40566F">Virtual fit supports correction planning; final assembly, sealing, preload, and process trials remain separate.</text>
    <text x="1128" y="604" text-anchor="end" font-size="13" fill="#72869A">ENGINEERING ILLUSTRATION</text>
  </g>
</svg>
