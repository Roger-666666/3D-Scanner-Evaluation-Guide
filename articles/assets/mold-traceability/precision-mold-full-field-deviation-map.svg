<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Precision mold full-field deviation map</title>
  <desc id="desc">A conceptual top-view deviation map of a precision mold plate and insert, with datum references, feature callouts, and a qualitative legend without measured values.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#DEE7EF" stroke-width="1"/>
    </pattern>
    <clipPath id="plateClip">
      <rect x="142" y="205" width="704" height="310" rx="22"/>
    </clipPath>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#40566F"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#F5F8FB"/>
  <rect x="34" y="34" width="1132" height="607" rx="6" fill="#FFFFFF" stroke="#C9D6E3" stroke-width="2"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="82" font-size="26" font-weight="700" fill="#17324D">PRECISION MOLD FULL-FIELD DEVIATION REVIEW</text>
    <text x="70" y="112" font-size="15" fill="#60758A">Conceptual CAD comparison · qualitative display · no measured values</text>

    <rect x="72" y="145" width="810" height="420" rx="4" fill="url(#grid)" stroke="#B8C8D8"/>

    <g clip-path="url(#plateClip)">
      <rect x="142" y="205" width="704" height="310" fill="#4DBB78"/>
      <path d="M122 190H374L430 352L339 540H120Z" fill="#48A4D5"/>
      <path d="M365 190H622L694 315L617 535H338L430 352Z" fill="#77C96B"/>
      <path d="M603 190H866V535H613L694 315Z" fill="#F1D34A"/>
      <ellipse cx="680" cy="337" rx="112" ry="92" fill="#E97749"/>
      <ellipse cx="689" cy="338" rx="60" ry="50" fill="#D54B4C"/>
      <path d="M127 434C270 388 397 430 503 532H120Z" fill="#2E8BC7"/>
    </g>

    <rect x="142" y="205" width="704" height="310" rx="22" fill="none" stroke="#17324D" stroke-width="5"/>
    <rect x="167" y="229" width="654" height="262" rx="14" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="10 8" opacity="0.9"/>

    <path d="M270 294H405L445 267H586L625 299H734V420H623L581 448H441L401 423H270Z"
      fill="#FFFFFF" fill-opacity="0.22" stroke="#17324D" stroke-width="4"/>
    <path d="M302 325H410L448 302H558L598 329H697V388H591L554 414H450L411 391H302Z"
      fill="none" stroke="#17324D" stroke-width="3"/>
    <rect x="479" y="321" width="68" height="72" rx="8" fill="#F8FAFC" fill-opacity="0.75" stroke="#17324D" stroke-width="3"/>

    <g fill="#FFFFFF" stroke="#17324D" stroke-width="2">
      <circle cx="192" cy="254" r="8"/><circle cx="796" cy="254" r="8"/>
      <circle cx="192" cy="466" r="8"/><circle cx="796" cy="466" r="8"/>
      <circle cx="357" cy="360" r="6"/><circle cx="668" cy="360" r="6"/>
    </g>

    <g fill="none" stroke="#40566F" stroke-width="2" marker-end="url(#arrow)">
      <path d="M234 176L282 287"/>
      <path d="M503 176L511 316"/>
      <path d="M749 179L687 295"/>
      <path d="M810 531L784 474"/>
    </g>
    <g font-size="14" font-weight="700" fill="#29445E">
      <text x="142" y="168">CAVITY BOUNDARY</text>
      <text x="444" y="168">INSERT FEATURE</text>
      <text x="677" y="171">LOCAL DEVIATION</text>
      <text x="712" y="550">DATUM FEATURES</text>
    </g>

    <g font-size="13" font-weight="700">
      <rect x="104" y="272" width="28" height="24" rx="3" fill="#1E66A8"/><text x="118" y="289" text-anchor="middle" fill="#FFFFFF">A</text>
      <rect x="474" y="526" width="28" height="24" rx="3" fill="#1E66A8"/><text x="488" y="543" text-anchor="middle" fill="#FFFFFF">B</text>
      <rect x="852" y="272" width="28" height="24" rx="3" fill="#1E66A8"/><text x="866" y="289" text-anchor="middle" fill="#FFFFFF">C</text>
    </g>

    <rect x="910" y="145" width="216" height="420" rx="4" fill="#F8FAFC" stroke="#B8C8D8"/>
    <text x="936" y="184" font-size="17" font-weight="700" fill="#17324D">QUALITATIVE LEGEND</text>
    <text x="936" y="210" font-size="13" fill="#65798C">Limits come from the drawing,</text>
    <text x="936" y="229" font-size="13" fill="#65798C">datum plan, and process stage.</text>

    <g font-size="14" fill="#334E68">
      <rect x="936" y="264" width="24" height="18" rx="2" fill="#D54B4C"/><text x="973" y="278">High positive</text>
      <rect x="936" y="299" width="24" height="18" rx="2" fill="#E97749"/><text x="973" y="313">Positive trend</text>
      <rect x="936" y="334" width="24" height="18" rx="2" fill="#F1D34A"/><text x="973" y="348">Transition</text>
      <rect x="936" y="369" width="24" height="18" rx="2" fill="#4DBB78"/><text x="973" y="383">Near nominal</text>
      <rect x="936" y="404" width="24" height="18" rx="2" fill="#48A4D5"/><text x="973" y="418">Negative trend</text>
      <rect x="936" y="439" width="24" height="18" rx="2" fill="#2E8BC7"/><text x="973" y="453">Low negative</text>
    </g>
    <line x1="936" y1="486" x2="1098" y2="486" stroke="#CCD7E1"/>
    <circle cx="946" cy="518" r="7" fill="#FFFFFF" stroke="#17324D" stroke-width="2"/>
    <text x="965" y="523" font-size="13" fill="#334E68">Datum / target feature</text>

    <text x="72" y="604" font-size="14" fill="#40566F">Review focus: cavity shape · insert geometry · slot and gate location · datum consistency</text>
    <text x="1128" y="604" text-anchor="end" font-size="13" fill="#72869A">ENGINEERING ILLUSTRATION</text>
  </g>
</svg>
