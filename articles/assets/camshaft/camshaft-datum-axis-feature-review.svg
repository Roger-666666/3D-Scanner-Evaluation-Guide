<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Camshaft datum axis and feature relationship review</title>
  <desc id="desc">A conceptual engineering diagram showing a camshaft datum axis, journal center relationships, lobe phase references, flange and keyway features, and a qualitative feature status matrix without measured values.</desc>
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#DEE7EF" stroke-width="1"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#40566F"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#F5F8FB"/>
  <rect x="34" y="34" width="1132" height="607" rx="6" fill="#FFFFFF" stroke="#C9D6E3" stroke-width="2"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="82" font-size="26" font-weight="700" fill="#17324D">DATUM AXIS &amp; FEATURE RELATIONSHIP REVIEW</text>
    <text x="70" y="112" font-size="15" fill="#60758A">Functional alignment for journals, lobes, flange, keyway, and visible hole entrances</text>

    <rect x="72" y="145" width="810" height="300" rx="4" fill="url(#grid)" stroke="#B8C8D8"/>
    <line x1="112" y1="300" x2="842" y2="300" stroke="#1E66A8" stroke-width="3" stroke-dasharray="11 7"/>

    <g stroke="#17324D" stroke-width="3">
      <rect x="124" y="282" width="710" height="36" rx="17" fill="#91A8BA"/>
      <rect x="110" y="270" width="58" height="60" rx="9" fill="#5B94C9"/>
      <rect x="804" y="260" width="62" height="80" rx="7" fill="#E8B941"/>
      <rect x="826" y="250" width="28" height="100" rx="5" fill="#E97749"/>

      <g fill="#4CB77A">
        <rect x="178" y="258" width="39" height="84" rx="8"/>
        <rect x="304" y="258" width="39" height="84" rx="8"/>
        <rect x="430" y="258" width="39" height="84" rx="8"/>
        <rect x="556" y="258" width="39" height="84" rx="8"/>
        <rect x="682" y="258" width="39" height="84" rx="8"/>
      </g>

      <g fill="#F1CF4A">
        <path d="M231 300 C214 273 220 236 251 220 C283 232 297 267 280 294 C299 319 289 353 258 370 C226 356 215 325 231 300Z"/>
        <path d="M357 300 C340 273 346 236 377 220 C409 232 423 267 406 294 C425 319 415 353 384 370 C352 356 341 325 357 300Z"/>
        <path d="M483 300 C466 273 472 236 503 220 C535 232 549 267 532 294 C551 319 541 353 510 370 C478 356 467 325 483 300Z"/>
        <path d="M609 300 C592 273 598 236 629 220 C661 232 675 267 658 294 C677 319 667 353 636 370 C604 356 593 325 609 300Z"/>
        <path d="M735 300 C718 273 724 236 755 220 C787 232 801 267 784 294 C803 319 793 353 762 370 C730 356 719 325 735 300Z"/>
      </g>
    </g>

    <g fill="#FFFFFF" stroke="#17324D" stroke-width="2">
      <circle cx="197" cy="300" r="6"/>
      <circle cx="323" cy="298" r="6"/>
      <circle cx="449" cy="301" r="6"/>
      <circle cx="575" cy="299" r="6"/>
      <circle cx="701" cy="302" r="6"/>
    </g>
    <g fill="#D9574D">
      <circle cx="323" cy="302" r="3"/>
      <circle cx="449" cy="297" r="3"/>
      <circle cx="575" cy="304" r="3"/>
      <circle cx="701" cy="298" r="3"/>
    </g>

    <rect x="835" y="274" width="18" height="10" rx="2" fill="#1E66A8" stroke="none"/>

    <g fill="none" stroke="#40566F" stroke-width="2" marker-end="url(#arrow)">
      <path d="M152 183 L196 257"/>
      <path d="M356 181 L376 219"/>
      <path d="M590 184 L575 257"/>
      <path d="M766 186 L838 271"/>
    </g>
    <g font-size="14" font-weight="700" fill="#29445E">
      <text x="106" y="175">JOURNAL DATUM</text>
      <text x="315" y="173">LOBE PHASE</text>
      <text x="525" y="176">CENTER RELATION</text>
      <text x="724" y="178">KEYWAY REFERENCE</text>
    </g>

    <g font-size="13" font-weight="700">
      <rect x="112" y="376" width="29" height="24" rx="3" fill="#1E66A8"/><text x="126" y="393" text-anchor="middle" fill="#FFFFFF">A</text>
      <text x="151" y="393" fill="#40566F">PRIMARY DATUM END</text>
      <rect x="672" y="376" width="29" height="24" rx="3" fill="#1E66A8"/><text x="686" y="393" text-anchor="middle" fill="#FFFFFF">B</text>
      <text x="711" y="393" fill="#40566F">SECONDARY DATUM END</text>
    </g>

    <rect x="910" y="145" width="216" height="300" rx="4" fill="#F8FAFC" stroke="#B8C8D8"/>
    <text x="936" y="184" font-size="17" font-weight="700" fill="#17324D">FEATURE LOGIC</text>
    <g font-size="13" fill="#40566F">
      <circle cx="944" cy="224" r="5" fill="#4CB77A"/><text x="960" y="229">Journal surface</text>
      <circle cx="944" cy="258" r="5" fill="#F1CF4A"/><text x="960" y="263">Cam lobe</text>
      <circle cx="944" cy="292" r="5" fill="#D9574D"/><text x="960" y="297">Center trend</text>
      <rect x="939" y="321" width="11" height="11" rx="2" fill="#1E66A8"/><text x="960" y="331">Key / datum feature</text>
    </g>
    <line x1="936" y1="355" x2="1098" y2="355" stroke="#CCD7E1"/>
    <text x="936" y="384" font-size="13" font-weight="700" fill="#29445E">INTERPRET TOGETHER</text>
    <text x="936" y="407" font-size="13" fill="#40566F">axis · phase · profile · position</text>

    <rect x="72" y="474" width="1054" height="91" rx="4" fill="#F8FAFC" stroke="#B8C8D8"/>
    <text x="96" y="503" font-size="14" font-weight="700" fill="#17324D">QUALITATIVE FEATURE STATUS</text>
    <g font-size="13" fill="#334E68">
      <text x="96" y="539">Journals</text><rect x="170" y="524" width="92" height="20" rx="3" fill="#4CB77A"/><text x="216" y="539" text-anchor="middle" fill="#FFFFFF">REVIEWED</text>
      <text x="294" y="539">Lobe profile</text><rect x="386" y="524" width="92" height="20" rx="3" fill="#4CB77A"/><text x="432" y="539" text-anchor="middle" fill="#FFFFFF">REVIEWED</text>
      <text x="510" y="539">Phase</text><rect x="568" y="524" width="92" height="20" rx="3" fill="#E8B941"/><text x="614" y="539" text-anchor="middle" fill="#17324D">CHECK</text>
      <text x="692" y="539">Keyway</text><rect x="758" y="524" width="92" height="20" rx="3" fill="#4CB77A"/><text x="804" y="539" text-anchor="middle" fill="#FFFFFF">REVIEWED</text>
      <text x="882" y="539">Hidden features</text><rect x="982" y="524" width="116" height="20" rx="3" fill="#91A3B3"/><text x="1040" y="539" text-anchor="middle" fill="#FFFFFF">SEPARATE TEST</text>
    </g>

    <text x="72" y="604" font-size="14" fill="#40566F">Functional datums must be defined before fitting; best fit alone can hide phase or axis relationships.</text>
    <text x="1128" y="604" text-anchor="end" font-size="13" fill="#72869A">ENGINEERING ILLUSTRATION</text>
  </g>
</svg>
