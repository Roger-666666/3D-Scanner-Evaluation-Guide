  <text x="869" y="510" font-family="Arial, sans-serif" font-size="14" fill="#264866">symmetry · design landmarks</text>
  <text x="869" y="534" font-family="Arial, sans-serif" font-size="14" fill="#264866">support and gravity recorded</text>

  <text x="72" y="605" font-family="Arial, sans-serif" font-size="14" fill="#264866">A scan records surface geometry in the measured state; comfort and support require separate wear and material validation.</text>
  <text x="941" y="605" font-family="Arial, sans-serif" font-size="13" fill="#6A8097">ENGINEERING ILLUSTRATION</text>
