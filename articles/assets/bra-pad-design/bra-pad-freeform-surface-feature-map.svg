<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Bra pad freeform surface feature map</title>
  <desc id="desc">An engineering illustration of a bra pad surface with apex, rim, neckline, underbust curve, support zone, and qualitative section curves.</desc>
