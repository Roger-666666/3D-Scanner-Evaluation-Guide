  <rect x="862" y="145" width="264" height="420" rx="5" fill="#F7FAFC" stroke="#C8D7E6"/>
  <text x="891" y="185" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#102F52">QUALITATIVE LEGEND</text>
  <text x="891" y="215" font-family="Arial, sans-serif" font-size="13" fill="#49657F">Project limits come from the</text>
  <text x="891" y="235" font-family="Arial, sans-serif" font-size="13" fill="#49657F">approved design and method.</text>

  <rect x="891" y="268" width="25" height="18" rx="2" fill="#B83D55"/>
  <text x="935" y="282" font-family="Arial, sans-serif" font-size="14" fill="#264866">High positive</text>
  <rect x="891" y="306" width="25" height="18" rx="2" fill="#EE7B4F"/>
  <text x="935" y="320" font-family="Arial, sans-serif" font-size="14" fill="#264866">Positive trend</text>
  <rect x="891" y="344" width="25" height="18" rx="2" fill="#F1D34F"/>
  <text x="935" y="358" font-family="Arial, sans-serif" font-size="14" fill="#264866">Transition</text>
  <rect x="891" y="382" width="25" height="18" rx="2" fill="#57BC76"/>
  <text x="935" y="396" font-family="Arial, sans-serif" font-size="14" fill="#264866">Near reference</text>
  <rect x="891" y="420" width="25" height="18" rx="2" fill="#4AA6CC"/>
  <text x="935" y="434" font-family="Arial, sans-serif" font-size="14" fill="#264866">Negative trend</text>
  <rect x="891" y="458" width="25" height="18" rx="2" fill="#2B83BC"/>
  <text x="935" y="472" font-family="Arial, sans-serif" font-size="14" fill="#264866">Low negative</text>

  <line x1="891" y1="501" x2="1097" y2="501" stroke="#D5E1EB" stroke-width="2"/>
  <text x="891" y="531" font-family="Arial, sans-serif" font-size="13" fill="#264866">Confirm datum · support · side</text>
  <text x="72" y="605" font-family="Arial, sans-serif" font-size="14" fill="#264866">A deviation map supports localization; it does not by itself prove material behavior, fit, comfort, or process root cause.</text>
  <text x="941" y="605" font-family="Arial, sans-serif" font-size="13" fill="#6A8097">ENGINEERING ILLUSTRATION</text>
</svg>
