<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Bra pad qualitative CAD deviation map</title>
  <desc id="desc">A conceptual bra pad deviation map comparing a measured surface with a design reference, using qualitative colors and no measured values.</desc>
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0V30" fill="none" stroke="#DFE8F0" stroke-width="1"/>
    </pattern>
    <clipPath id="cupClip">
      <path d="M169 439C146 362 175 281 244 222C320 157 438 153 550 190C646 222 721 286 760 372C776 407 777 440 760 470C686 504 595 522 493 528C366 535 250 505 169 439Z"/>
    </clipPath>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#40566F"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#F4F7FA"/>
  <rect x="34" y="34" width="1132" height="607" rx="6" fill="#FFFFFF" stroke="#C8D7E6" stroke-width="2"/>

  <text x="70" y="82" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#102F52">BRA PAD CAD DEVIATION REVIEW</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="15" fill="#49657F">Conceptual comparison · controlled support and alignment · no measured values</text>

  <rect x="72" y="145" width="760" height="420" rx="5" fill="url(#grid)" stroke="#C8D7E6"/>

  <g clip-path="url(#cupClip)">
