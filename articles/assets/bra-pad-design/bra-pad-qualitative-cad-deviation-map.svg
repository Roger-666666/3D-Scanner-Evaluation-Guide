    <path d="M130 465C246 394 360 382 475 419C573 450 666 456 805 408V545H130Z" fill="#2B83BC"/>
    <path d="M127 400C258 336 389 326 512 360C611 388 698 391 792 358L807 456C686 498 577 490 477 456C358 414 250 431 154 486Z" fill="#57BC76"/>
    <path d="M164 320C292 263 411 261 521 296C620 328 694 327 766 299L791 381C688 416 596 408 504 378C391 341 277 352 148 417Z" fill="#F1D34F"/>
    <path d="M221 230C314 165 453 152 568 199C640 229 694 269 737 321C658 336 588 324 515 300C412 265 309 269 173 329C180 289 195 258 221 230Z" fill="#EE7B4F"/>
    <ellipse cx="493" cy="263" rx="128" ry="88" fill="#D84F58" opacity="0.86"/>
    <ellipse cx="493" cy="263" rx="61" ry="43" fill="#B83D55" opacity="0.82"/>

    <path d="M186 443C285 397 395 382 511 399C610 414 682 436 756 461" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.78"/>
    <path d="M173 385C278 337 395 325 513 347C606 365 683 383 768 402" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.78"/>
    <path d="M191 319C299 279 406 274 514 300C601 321 668 333 741 335" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.78"/>
    <path d="M248 229C337 204 432 207 522 239C588 262 641 283 692 296" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.78"/>
  </g>

  <path d="M169 439C146 362 175 281 244 222C320 157 438 153 550 190C646 222 721 286 760 372C776 407 777 440 760 470C686 504 595 522 493 528C366 535 250 505 169 439Z" fill="none" stroke="#173C61" stroke-width="5"/>

  <g fill="#FFFFFF" stroke="#173C61" stroke-width="3">
    <circle cx="493" cy="263" r="7"/>
    <circle cx="169" cy="439" r="6"/>
    <circle cx="760" cy="470" r="6"/>
    <circle cx="258" cy="234" r="6"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#14375B">
    <text x="433" y="145">APEX SHIFT</text>
    <text x="104" y="525">RIM PROFILE</text>
    <text x="665" y="535">EDGE RETURN</text>
    <text x="213" y="188">NECKLINE</text>
  </g>
  <g stroke="#40566F" stroke-width="2" marker-end="url(#arrow)">
