<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Automotive glass full-field surface deviation map</title>
  <desc id="desc">A conceptual engineering visualization showing a curved windshield, reference points, surface deviation zones, edge contour checks, and a qualitative legend without measurement values.</desc>
  <defs>
    <clipPath id="glassClip">
      <path d="M206 205 Q600 122 994 205 L1080 501 Q600 586 120 501 Z"/>
    </clipPath>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
