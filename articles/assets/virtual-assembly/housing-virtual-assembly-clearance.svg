<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Virtual assembly clearance and interference analysis</title>
  <desc id="desc">An exploded digital assembly of a generic housing with alignment axes, clearance zones, and interference regions.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7f9fb"/><stop offset="1" stop-color="#e5ebf1"/></linearGradient>
    <linearGradient id="shell" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#9fb2c3"/><stop offset="1" stop-color="#50677b"/></linearGradient>
    <linearGradient id="shell2" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#c4d0da"/><stop offset="1" stop-color="#7e93a5"/></linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#c8d2dc" opacity=".45"/></pattern>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="13" stdDeviation="12" flood-color="#475569" flood-opacity=".25"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <rect x="34" y="34" width="1132" height="607" rx="4" fill="url(#grid2)" stroke="#cbd5e1"/>
  <text x="70" y="86" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#152331">VIRTUAL ASSEMBLY REVIEW</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="15" fill="#52606d">Clearance, alignment and interference - conceptual view</text>

  <g transform="translate(95 80)" filter="url(#shadow2)">
    <g opacity=".86" transform="translate(190 92)">
      <path d="M110 80L520 20L700 125L292 188Z" fill="url(#shell2)" stroke="#32485a" stroke-width="5"/>
      <path d="M110 80L130 126L295 224L292 188Z" fill="#7890a3" stroke="#32485a" stroke-width="4"/>
      <path d="M292 188L295 224L705 160L700 125Z" fill="#667f92" stroke="#32485a" stroke-width="4"/>
      <rect x="263" y="83" width="205" height="50" rx="17" transform="rotate(-8 365 108)" fill="#e4eaf0" stroke="#50677b" stroke-width="3"/>
    </g>

    <g transform="translate(230 245)">
      <path d="M130 55L475 5L630 94L286 148Z" fill="#d7e0e7" stroke="#40566a" stroke-width="4"/>
      <path d="M130 55L143 95L287 180L286 148Z" fill="#8094a5" stroke="#40566a" stroke-width="4"/>
      <path d="M286 148L287 180L633 126L630 94Z" fill="#6d8396" stroke="#40566a" stroke-width="4"/>
      <path d="M183 63L450 25L568 92L301 133Z" fill="#ecf1f5" stroke="#91a3b2" stroke-width="3"/>
      <g fill="#1f6feb" stroke="#164f9f" stroke-width="3">
        <path d="M240 65L350 49L402 78L291 96Z"/>
        <path d="M408 51L487 40L527 63L447 75Z"/>
      </g>
      <g fill="#22c55e" opacity=".76">
        <ellipse cx="294" cy="107" rx="54" ry="18"/><ellipse cx="470" cy="83" rx="49" ry="16"/>
      </g>
      <g fill="#ef4444" opacity=".9">
        <path d="M528 86L574 80L596 93L550 100Z"/><path d="M196 78L225 73L242 83L212 89Z"/>
      </g>
    </g>

    <g stroke="#2563eb" stroke-width="2" stroke-dasharray="9 8" opacity=".75">
      <path d="M420 160V362"/><path d="M565 140V338"/><path d="M714 125V315"/><path d="M330 175V384"/>
    </g>
    <g fill="#2563eb"><path d="M414 360L420 372L426 360Z"/><path d="M559 336L565 348L571 336Z"/><path d="M708 313L714 325L720 313Z"/><path d="M324 382L330 394L336 382Z"/></g>
  </g>

  <g transform="translate(82 520)" font-family="Arial, sans-serif" font-size="15" fill="#334155">
    <rect width="1035" height="82" rx="4" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="42" cy="41" r="11" fill="#22c55e"/><text x="64" y="47" font-weight="700">CLEARANCE</text><text x="165" y="47" fill="#64748b">available fit zone</text>
    <circle cx="390" cy="41" r="11" fill="#ef4444"/><text x="412" y="47" font-weight="700">INTERFERENCE</text><text x="540" y="47" fill="#64748b">review required</text>
    <path d="M760 42H810" stroke="#2563eb" stroke-width="3" stroke-dasharray="8 7"/><text x="830" y="47" font-weight="700">ALIGNMENT AXIS</text>
  </g>
