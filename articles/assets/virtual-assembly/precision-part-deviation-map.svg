<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Full-field deviation review of a curved precision component</title>
  <desc id="desc">A conceptual engineering visualization with a deviation color map, profile callouts, and a non-numeric legend.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e8edf2"/>
    </linearGradient>
    <linearGradient id="map" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1557ff"/>
      <stop offset="0.28" stop-color="#00a8e8"/>
      <stop offset="0.5" stop-color="#22c55e"/>
      <stop offset="0.72" stop-color="#facc15"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="legend" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1557ff"/>
      <stop offset="0.28" stop-color="#00a8e8"/>
      <stop offset="0.5" stop-color="#22c55e"/>
      <stop offset="0.72" stop-color="#facc15"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#cbd5e1" stroke-width="1" opacity=".45"/>
    </pattern>
    <clipPath id="partClip">
      <path d="M175 430C285 242 472 167 777 190C857 196 907 238 904 295C901 351 850 383 765 370C548 337 397 380 286 508C247 552 186 542 158 501C142 476 148 456 175 430Z"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#64748b" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="34" y="34" width="1132" height="607" rx="4" fill="url(#grid)" stroke="#cbd5e1"/>
  <text x="70" y="86" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#152331">FULL-FIELD DEVIATION REVIEW</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="15" fill="#52606d">Conceptual visualization - no measured values</text>

  <g filter="url(#shadow)">
    <path d="M175 430C285 242 472 167 777 190C857 196 907 238 904 295C901 351 850 383 765 370C548 337 397 380 286 508C247 552 186 542 158 501C142 476 148 456 175 430Z" fill="#aab7c4" stroke="#334155" stroke-width="5"/>
    <g clip-path="url(#partClip)">
      <rect x="135" y="160" width="800" height="400" fill="url(#map)"/>
      <ellipse cx="330" cy="335" rx="165" ry="122" fill="#00a8e8" opacity=".6"/>
      <ellipse cx="610" cy="280" rx="175" ry="95" fill="#22c55e" opacity=".58"/>
      <ellipse cx="805" cy="292" rx="95" ry="76" fill="#facc15" opacity=".72"/>
      <ellipse cx="720" cy="355" rx="72" ry="48" fill="#ef4444" opacity=".78"/>
      <path d="M210 450C330 293 490 245 820 277" fill="none" stroke="#ffffff" stroke-width="3" opacity=".8"/>
      <path d="M195 480C350 332 520 308 800 341" fill="none" stroke="#0f172a" stroke-width="2" opacity=".35"/>
      <g stroke="#ffffff" stroke-width="1" opacity=".45">
        <path d="M218 385L290 520"/><path d="M275 320L357 470"/><path d="M356 262L440 410"/><path d="M450 220L510 385"/>
        <path d="M555 194L580 374"/><path d="M660 190L652 365"/><path d="M760 194L735 370"/><path d="M850 220L800 374"/>
      </g>
    </g>
    <circle cx="267" cy="450" r="28" fill="#e8edf2" stroke="#334155" stroke-width="5"/>
    <circle cx="820" cy="286" r="24" fill="#e8edf2" stroke="#334155" stroke-width="5"/>
  </g>

  <g fill="none" stroke="#243746" stroke-width="2">
    <path d="M279 440L350 545H485"/>
    <path d="M560 226L505 146H360"/>
    <path d="M742 346L858 478H1010"/>
    <path d="M820 286L976 176H1050"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#243746">
    <text x="365" y="140">PROFILE</text>
    <text x="500" y="550">EDGE</text>
    <text x="1020" y="181">HOLE</text>
    <text x="1020" y="483">MATING FACE</text>
  </g>

  <g transform="translate(1080 235)">
    <rect x="0" y="0" width="26" height="220" rx="4" fill="url(#legend)" stroke="#64748b"/>
    <g stroke="#334155" stroke-width="2"><path d="M26 5H38"/><path d="M26 58H38"/><path d="M26 110H38"/><path d="M26 162H38"/><path d="M26 215H38"/></g>
    <text x="-4" y="-14" font-family="Arial, sans-serif" font-size="13" fill="#334155">+</text>
    <text x="-2" y="241" font-family="Arial, sans-serif" font-size="13" fill="#334155">-</text>
  </g>
  <g transform="translate(70 578)" font-family="Arial, sans-serif" font-size="14" fill="#52606d">
    <circle cx="8" cy="-5" r="7" fill="#22c55e"/><text x="24" y="0">Nominal zone</text>
    <circle cx="155" cy="-5" r="7" fill="#ef4444"/><text x="171" y="0">Positive trend</text>
    <circle cx="322" cy="-5" r="7" fill="#1557ff"/><text x="338" y="0">Negative trend</text>
  </g>
</svg>
